<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="12;url=https://s.shopee.co.id/3B382GiTmL">
    <title>Mohon Tunggu...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        video {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <video id="myVideo" autoplay muted playsinline>
        <source src="aneh.mp4" type="video/mp4">
        Browser Anda tidak mendukung video.
    </video>

    <script>
        var video = document.getElementById('myVideo');
        
        // Ketika video selesai diputar, langsung pindah ke Shopee
        video.onended = function() {
            window.location.href = "https://s.shopee.co.id/3B382GiTmL";
        };

        // Tambahan: Jika user klik video, juga langsung pindah ke Shopee
        video.onclick = function() {
            window.location.href = "https://s.shopee.co.id/3B382GiTmL";
        };
    </script>

</body>
</html>
